name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install pystray Pillow pywebview fastapi uvicorn httpx websockets pywin32

      - name: Install p115client from local wheels
        run: python -c "import subprocess, pathlib; [subprocess.run(['pip', 'install', str(f)], check=True) for f in sorted(pathlib.Path('combined/wheels').glob('*.whl'))]"
        continue-on-error: true

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        working-directory: combined
        run: python build_exe.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload executable (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: 115StrmTool-Windows
          path: combined/dist/115网盘STRM生成与302工具.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: combined/dist/115网盘STRM生成与302工具.exe
          generate_release_notes: true
