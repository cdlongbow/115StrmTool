name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release 版本号（如 v2.8.33）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install pystray Pillow pywebview fastapi uvicorn httpx websockets pywin32

      - name: Install p115client from local wheels
        run: |
          python -c "
          import subprocess, sys
          from pathlib import Path

          skip_tags = ('macosx', 'manylinux', 'musllinux', 'aarch64')
          for f in sorted(Path('combined/wheels').glob('*.whl')):
              if any(s in f.name for s in skip_tags):
                  print(f'Skip: {f.name}')
                  continue
              print(f'Install: {f.name}')
              subprocess.run([sys.executable, '-m', 'pip', 'install', str(f)], check=True)
          "

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        working-directory: combined
        run: python build_exe.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload executable (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: 115StrmTool-Windows
          path: combined/dist/115网盘STRM生成与302工具.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          files: combined/dist/115网盘STRM生成与302工具.exe
          generate_release_notes: true
